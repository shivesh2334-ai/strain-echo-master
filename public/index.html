        const App = () => {
            const [activeCategory, setActiveCategory] = useState(null);
            const [activeTopic, setActiveTopic] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [progress, setProgress] = useState({});
            const [completedTips, setCompletedTips] = useState({});

            // Load progress from localStorage
            useEffect(() => {
                const saved = localStorage.getItem('strainMasterProgress');
                if (saved) {
                    setProgress(JSON.parse(saved));
                }
                const savedTips = localStorage.getItem('strainMasterTips');
                if (savedTips) {
                    setCompletedTips(JSON.parse(savedTips));
                }
            }, []);

            // Save progress
            useEffect(() => {
                localStorage.setItem('strainMasterProgress', JSON.stringify(progress));
            }, [progress]);

            useEffect(() => {
                localStorage.setItem('strainMasterTips', JSON.stringify(completedTips));
            }, [completedTips]);

            const toggleTip = (category, topic, tipIndex) => {
                const key = `${category}-${topic}-${tipIndex}`;
                setCompletedTips(prev => ({
                    ...prev,
                    [key]: !prev[key]
                }));
            };

            const calculateProgress = (category) => {
                if (!strainData[category]) return 0;
                const topics = Object.keys(strainData[category].topics);
                let totalTips = 0;
                let completed = 0;
                
                topics.forEach(topic => {
                    const tips = strainData[category].topics[topic].tips;
                    totalTips += tips.length;
                    tips.forEach((_, idx) => {
                        if (completedTips[`${category}-${topic}-${idx}`]) completed++;
                    });
                });
                
                return totalTips > 0 ? Math.round((completed / totalTips) * 100) : 0;
            };

            const filteredData = () => {
                if (!searchQuery) return strainData;
                
                const filtered = {};
                Object.keys(strainData).forEach(category => {
                    const cat = strainData[category];
                    const matchingTopics = {};
                    
                    Object.keys(cat.topics).forEach(topic => {
                        const t = cat.topics[topic];
                        const matches = topic.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                       t.tips.some(tip => tip.toLowerCase().includes(searchQuery.toLowerCase())) ||
                                       t.videos.some(v => v.title.toLowerCase().includes(searchQuery.toLowerCase()));
                        
                        if (matches) {
                            matchingTopics[topic] = t;
                        }
                    });
                    
                    if (Object.keys(matchingTopics).length > 0) {
                        filtered[category] = { ...cat, topics: matchingTopics };
                    }
                });
                
                return filtered;
            };

            const renderIcon = (iconName) => {
                const Icon = Icons[iconName];
                return Icon ? <Icon /> : null;
            };

            return (
                <div className="min-h-screen bg-slate-900">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex items-center justify-between h-16">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center pulse-ring">
                                        <Icons.HeartPulse />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                                            StrainEcho Master
                                        </h1>
                                        <p className="text-xs text-slate-400">Clinical Strain Echocardiography 2026</p>
                                    </div>
                                </div>
                                
                                <div className="hidden md:flex items-center gap-4">
                                    <div className="relative">
                                        <input
                                            type="text"
                                            placeholder="Search topics, tips, videos..."
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="w-64 pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-200 placeholder-slate-500"
                                        />
                                        <div className="absolute left-3 top-2.5 text-slate-500">
                                            <Icons.Search />
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2 text-sm text-slate-400">
                                        <Icons.GraduationCap />
                                        <span>Free Medical Education</span>
                                    </div>
                                </div>

                                <button 
                                    className="md:hidden p-2 text-slate-400"
                                    onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                >
                                    {mobileMenuOpen ? <Icons.X /> : <Icons.Menu />}
                                </button>
                            </div>
                        </div>
                        
                        {/* Mobile Search */}
                        {mobileMenuOpen && (
                            <div className="md:hidden px-4 pb-4">
                                <input
                                    type="text"
                                    placeholder="Search..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm"
                                />
                            </div>
                        )}
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        
                        {/* Hero Section */}
                        {!activeCategory && !searchQuery && (
                            <div className="mb-12 text-center">
                                <h2 className="text-4xl md:text-5xl font-bold mb-4 text-white">
                                    Master <span className="gradient-text">Strain Echocardiography</span>
                                </h2>
                                <p className="text-lg text-slate-400 max-w-2xl mx-auto mb-8">
                                    Comprehensive learning platform featuring curated educational resources from 
                                    Stanford, Mayo Clinic, Johns Hopkins, MIT, and ASE. Master the clinical applications 
                                    of strain imaging with expert tips and high-quality video tutorials.
                                </p>
                                <div className="flex flex-wrap justify-center gap-4 text-sm">
                                    <span className="px-4 py-2 bg-blue-500/20 text-blue-300 rounded-full border border-blue-500/30">
                                        100% Free Resources
                                    </span>
                                    <span className="px-4 py-2 bg-purple-500/20 text-purple-300 rounded-full border border-purple-500/30">
                                        Expert Curated
                                    </span>
                                    <span className="px-4 py-2 bg-emerald-500/20 text-emerald-300 rounded-full border border-emerald-500/30">
                                        CME Eligible
                                    </span>
                                </div>
                            </div>
                        )}

                        {/* Category Grid */}
                        {!activeCategory && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                                {Object.keys(filteredData()).map((category) => {
                                    const cat = strainData[category];
                                    const prog = calculateProgress(category);
                                    
                                    return (
                                        <div
                                            key={category}
                                            onClick={() => setActiveCategory(category)}
                                            className="card-hover cursor-pointer group relative overflow-hidden rounded-2xl bg-slate-800/50 border border-slate-700 p-6"
                                        >
                                            <div className={`absolute inset-0 bg-gradient-to-br ${cat.color} opacity-0 group-hover:opacity-10 transition-opacity`} />
                                            
                                            <div className="flex items-start justify-between mb-4">
                                                <div className={`p-3 rounded-xl bg-gradient-to-br ${cat.color} text-white`}>
                                                    {renderIcon(cat.icon)}
                                                </div>
                                                {prog > 0 && (
                                                    <span className="text-xs font-medium text-emerald-400 bg-emerald-400/10 px-2 py-1 rounded-full">
                                                        {prog}% Complete
                                                    </span>
                                                )}
                                            </div>
                                            
                                            <h3 className="text-lg font-semibold text-white mb-2">{category}</h3>
                                            <p className="text-sm text-slate-400 mb-4 line-clamp-2">{cat.description}</p>
                                            
                                            <div className="flex items-center justify-between text-xs text-slate-500">
                                                <span>{Object.keys(cat.topics).length} Topics</span>
                                                <span className="group-hover:text-blue-400 transition-colors">Explore →</span>
                                            </div>
                                            
                                            {prog > 0 && (
                                                <div className="mt-4 h-1 bg-slate-700 rounded-full overflow-hidden">
                                                    <div 
                                                        className="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-500"
                                                        style={{ width: `${prog}%` }}
                                                    />
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* Category Detail View */}
                        {activeCategory && !activeTopic && (
                            <div>
                                <button
                                    onClick={() => setActiveCategory(null)}
                                    className="mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors"
                                >
                                    ← Back to Categories
                                </button>
                                
                                <div className="mb-8">
                                    <div className={`inline-flex items-center gap-2 px-4 py-2 rounded-full bg-gradient-to-r ${strainData[activeCategory].color} text-white mb-4`}>
                                        {renderIcon(strainData[activeCategory].icon)}
                                        <span className="font-medium">{activeCategory}</span>
                                    </div>
                                    <h2 className="text-3xl font-bold text-white mb-2">{activeCategory}</h2>
                                    <p className="text-slate-400">{strainData[activeCategory].description}</p>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {Object.keys(strainData[activeCategory].topics).map((topic) => {
                                        const topicData = strainData[activeCategory].topics[topic];
                                        const completedCount = topicData.tips.filter((_, idx) => 
                                            completedTips[`${activeCategory}-${topic}-${idx}`]
                                        ).length;
                                        
                                        return (
                                            <div
                                                key={topic}
                                                onClick={() => setActiveTopic(topic)}
                                                className="card-hover cursor-pointer rounded-xl bg-slate-800 border border-slate-700 p-6 hover:border-blue-500/50 transition-all"
                                            >
                                                <div className="flex items-start justify-between mb-4">
                                                    <h3 className="text-xl font-semibold text-white">{topic}</h3>
                                                    {completedCount > 0 && (
                                                        <span className="flex items-center gap-1 text-xs text-emerald-400 bg-emerald-400/10 px-2 py-1 rounded-full">
                                                            <Icons.CheckCircle />
                                                            {completedCount}/{topicData.tips.length}
                                                        </span>
                                                    )}
                                                </div>
                                                
                                                <div className="space-y-3 mb-4">
                                                    {topicData.tips.slice(0, 2).map((tip, idx) => (
                                                        <div key={idx} className="flex items-start gap-2 text-sm text-slate-400">
                                                            <span className="text-blue-400 mt-1">•</span>
                                                            <span className="line-clamp-1">{tip}</span>
                                                        </div>
                                                    ))}
                                                    {topicData.tips.length > 2 && (
                                                        <p className="text-xs text-slate-500 pl-4">
                                                            +{topicData.tips.length - 2} more tips
                                                        </p>
                                                    )}
                                                </div>
                                                
                                                <div className="flex items-center gap-4 text-xs text-slate-500">
                                                    <span className="flex items-center gap-1">
                                                        <Icons.Play />
                                                        {topicData.videos.length} Videos
                                                    </span>
                                                    <span className="flex items-center gap-1">
                                                        <Icons.Lightbulb />
                                                        {topicData.tips.length} Tips
                                                    </span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Topic Detail View */}
                        {activeTopic && (
                            <div>
                                <button
                                    onClick={() => setActiveTopic(null)}
                                    className="mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors"
                                >
                                    ← Back to {activeCategory}
                                </button>

                                <div className="mb-8">
                                    <h2 className="text-3xl font-bold text-white mb-2">{activeTopic}</h2>
                                    <p className="text-slate-400">Master the key concepts and clinical applications</p>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    {/* Learning Tips Section */}
                                    <div>
                                        <div className="flex items-center gap-2 mb-6">
                                            <Icons.Lightbulb />
                                            <h3 className="text-xl font-semibold text-white">Expert Learning Tips</h3>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            {strainData[activeCategory].topics[activeTopic].tips.map((tip, idx) => {
                                                const isCompleted = completedTips[`${activeCategory}-${activeTopic}-${idx}`];
                                                
                                                return (
                                                    <div
                                                        key={idx}
                                                        onClick={() => toggleTip(activeCategory, activeTopic, idx)}
                                                        className={`tip-card p-4 rounded-lg cursor-pointer transition-all ${isCompleted ? 'opacity-60 border-emerald-500' : ''}`}
                                                    >
                                                        <div className="flex items-start gap-3">
                                                            <div className={`mt-0.5 w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${isCompleted ? 'bg-emerald-500 border-emerald-500' : 'border-slate-500'}`}>
                                                                {isCompleted && <Icons.CheckCircle />}
                                                            </div>
                                                            <p className={`text-sm ${isCompleted ? 'text-slate-400 line-through' : 'text-slate-200'}`}>
                                                                {tip}
                                                            </p>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Video Resources Section */}
                                    <div>
                                        <div className="flex items-center gap-2 mb-6">
                                            <Icons.Play />
                                            <h3 className="text-xl font-semibold text-white">Educational Videos</h3>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            {strainData[activeCategory].topics[activeTopic].videos.map((video, idx) => (
                                                <a
                                                    key={idx}
                                                    href={video.url}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="video-card block p-5 rounded-xl hover:border-blue-500/50 transition-all group"
                                                >
                                                    <div className="flex items-start justify-between mb-3">
                                                        <div className="flex items-center gap-2">
                                                            <span className="institution-badge px-3 py-1 rounded-full text-xs font-medium text-white">
                                                                {video.source}
                                                            </span>
                                                            {video.free && (
                                                                <span className="px-2 py-0.5 rounded-full text-xs bg-emerald-500/20 text-emerald-400 border border-emerald-500/30">
                                                                    FREE
                                                                </span>
                                                            )}
                                                        </div>
                                                        <Icons.ExternalLink />
                                                    </div>
                                                    
                                                    <h4 className="text-lg font-medium text-white mb-2 group-hover:text-blue-400 transition-colors">
                                                        {video.title}
                                                    </h4>
                                                    
                                                    <div className="flex items-center gap-4 text-xs text-slate-400">
                                                        <span className="flex items-center gap-1">
                                                            <Icons.Clock />
                                                            {video.duration}
                                                        </span>
                                                        <span className="px-2 py-1 bg-slate-800 rounded text-slate-300">
                                                            {video.type}
                                                        </span>
                                                    </div>
                                                </a>
                                            ))}
                                        </div>

                                        {/* Additional Resources Card */}
                                        <div className="mt-6 p-5 rounded-xl bg-gradient-to-br from-blue-600/20 to-purple-600/20 border border-blue-500/30">
                                            <div className="flex items-center gap-2 mb-3">
                                                <Icons.BookOpen />
                                                <h4 className="font-semibold text-white">Additional Resources</h4>
                                            </div>
                                            <ul className="space-y-2 text-sm text-slate-300">
                                                <li className="flex items-start gap-2">
                                                    <span className="text-blue-400">→</span>
                                                    <a href="https://www.asecho.org/practice-clinical-resources/resource-library/strain-imaging/" target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors">
                                                        ASE Strain Imaging Resource Library (Official)
                                                    </a>
                                                </li>
                                                <li className="flex items-start gap-2">
                                                    <span className="text-blue-400">→</span>
                                                    <a href="https://www.youtube.com/c/ASE360" target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors">
                                                        ASE360 YouTube Channel (Free Videos)
                                                    </a>
                                                </li>
                                                <li className="flex items-start gap-2">
                                                    <span className="text-blue-400">→</span>
                                                    <span>ASE Comprehensive Strain Imaging Textbook (Purchase Required)</span>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Search Results View */}
                        {searchQuery && !activeCategory && (
                            <div>
                                <div className="mb-6 flex items-center justify-between">
                                    <h2 className="text-xl font-semibold text-white">
                                        Search Results for "{searchQuery}"
                                    </h2>
                                    <button
                                        onClick={() => setSearchQuery("")}
                                        className="text-sm text-slate-400 hover:text-white"
                                    >
                                        Clear Search
                                    </button>
                                </div>
                                
                                {Object.keys(filteredData()).length === 0 ? (
                                    <div className="text-center py-12 text-slate-500">
                                        <Icons.Search />
                                        <p className="mt-4">No results found. Try different keywords.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-8">
                                        {Object.keys(filteredData()).map(category => (
                                            <div key={category}>
                                                <h3 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                                                    <span className={`w-3 h-3 rounded-full bg-gradient-to-r ${strainData[category].color}`} />
                                                    {category}
                                                </h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {Object.keys(filteredData()[category].topics).map(topic => (
                                                        <div
                                                            key={topic}
                                                            onClick={() => {
                                                                setActiveCategory(category);
                                                                setActiveTopic(topic);
                                                                setSearchQuery("");
                                                            }}
                                                            className="p-4 rounded-lg bg-slate-800 border border-slate-700 hover:border-blue-500/50 cursor-pointer transition-all"
                                                        >
                                                            <h4 className="font-medium text-white mb-2">{topic}</h4>
                                                            <p className="text-sm text-slate-400 line-clamp-2">
                                                                {filteredData()[category].topics[topic].tips[0]}
                                                            </p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-slate-800 mt-16 py-8 bg-slate-900/50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                <div className="text-sm text-slate-500">
                                    <p>Educational resources curated from leading institutions:</p>
                                    <p className="mt-1">Stanford Medicine • Mayo Clinic • Cleveland Clinic • MIT • ASE</p>
                                </div>
                                <div className="flex items-center gap-4 text-sm text-slate-600">
                                    <span>© 2026 StrainEcho Master</span>
                                    <span>•</span>
                                    <span>Open Source Education</span>
                                </div>
                            </div>
                            <div className="mt-4 text-xs text-slate-600 text-center md:text-left">
                                <p>Disclaimer: This educational platform is for training purposes only. Clinical decisions should always be based on formal training and institutional protocols.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
